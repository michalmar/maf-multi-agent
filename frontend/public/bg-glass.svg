<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="crisp" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.4"/>
    </filter>

    <!-- Glass surface fills — vibrant translucent colors -->
    <linearGradient id="g-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="g-blue" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="g-cyan" x1="0" y1="0.8" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="g-rose" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.48"/>
      <stop offset="50%" stop-color="#f472b6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fda4af" stop-opacity="0.36"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="g-teal" x1="0.8" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.48"/>
      <stop offset="50%" stop-color="#14b8a6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#99f6e4" stop-opacity="0.36"/>
    </linearGradient>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.52"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0.38"/>
    </linearGradient>

    <!-- Edge highlights for glass refraction -->
    <linearGradient id="edge-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edge-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Soft background glow spots -->
  <g filter="url(#glow)" opacity="0.8">
    <ellipse cx="180" cy="120" rx="220" ry="160" fill="#a78bfa" opacity="0.22"/>
    <ellipse cx="1700" cy="100" rx="260" ry="180" fill="#60a5fa" opacity="0.2"/>
    <ellipse cx="960" cy="540" rx="300" ry="200" fill="#06b6d4" opacity="0.12"/>
    <ellipse cx="200" cy="900" rx="240" ry="160" fill="#f472b6" opacity="0.18"/>
    <ellipse cx="1600" cy="850" rx="280" ry="180" fill="#fbbf24" opacity="0.16"/>
  </g>

  <!-- ═══ Top-left: large angular shard ═══ -->
  <g transform="rotate(-14 160 140)">
    <path d="M40,20 L280,5 L320,180 L240,210 L60,195 Z" fill="url(#g-violet)" filter="url(#crisp)"/>
    <path d="M40,20 L280,5 L320,180 L240,210 L60,195 Z" fill="none" stroke="white" stroke-opacity="0.22" stroke-width="0.8"/>
    <!-- top edge highlight -->
    <path d="M40,20 L280,5" stroke="white" stroke-opacity="0.4" stroke-width="1.2" filter="url(#crisp)"/>
    <!-- surface caustic -->
    <path d="M100,40 L260,30 L280,120" fill="none" stroke="#c4b5fd" stroke-opacity="0.25" stroke-width="18" stroke-linecap="round" filter="url(#soft)"/>
  </g>

  <!-- Small triangular chip nearby -->
  <g transform="rotate(22 300 80)">
    <path d="M260,40 L360,20 L340,110 Z" fill="url(#g-blue)" filter="url(#crisp)"/>
    <path d="M260,40 L360,20 L340,110 Z" fill="none" stroke="white" stroke-opacity="0.18" stroke-width="0.6"/>
    <path d="M260,40 L360,20" stroke="white" stroke-opacity="0.35" stroke-width="1" filter="url(#crisp)"/>
  </g>

  <!-- ═══ Top-center: elongated shard ═══ -->
  <g transform="rotate(-5 700 60)">
    <path d="M560,-20 L840,-40 L860,80 L820,140 L580,120 L540,50 Z" fill="url(#g-cyan)" filter="url(#crisp)"/>
    <path d="M560,-20 L840,-40 L860,80 L820,140 L580,120 L540,50 Z" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="0.7"/>
    <path d="M560,-20 L840,-40" stroke="white" stroke-opacity="0.38" stroke-width="1.1" filter="url(#crisp)"/>
    <path d="M600,10 L800,0 L820,80" fill="none" stroke="#67e8f9" stroke-opacity="0.2" stroke-width="22" stroke-linecap="round" filter="url(#soft)"/>
  </g>

  <!-- ═══ Top-right: faceted cluster ═══ -->
  <g transform="rotate(-20 1680 90)">
    <path d="M1540,-10 L1780,-30 L1830,100 L1800,200 L1580,180 L1520,80 Z" fill="url(#g-indigo)" filter="url(#crisp)"/>
    <path d="M1540,-10 L1780,-30 L1830,100 L1800,200 L1580,180 L1520,80 Z" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="0.8"/>
    <path d="M1540,-10 L1780,-30 L1830,100" stroke="white" stroke-opacity="0.36" stroke-width="1.2" filter="url(#crisp)"/>
    <path d="M1600,20 L1760,10 L1800,110" fill="none" stroke="#a5b4fc" stroke-opacity="0.22" stroke-width="20" stroke-linecap="round" filter="url(#soft)"/>
  </g>
  <!-- small chip -->
  <g transform="rotate(10 1750 200)">
    <path d="M1700,170 L1820,150 L1840,240 L1720,250 Z" fill="url(#g-amber)" filter="url(#crisp)"/>
    <path d="M1700,170 L1820,150" stroke="white" stroke-opacity="0.3" stroke-width="0.8" filter="url(#crisp)"/>
    <path d="M1700,170 L1820,150 L1840,240 L1720,250 Z" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="0.5"/>
  </g>

  <!-- ═══ Mid-left: tall angular shard ═══ -->
  <g transform="rotate(8 80 520)">
    <path d="M-40,360 L120,340 L160,540 L140,680 L-20,660 L-60,480 Z" fill="url(#g-teal)" filter="url(#crisp)"/>
    <path d="M-40,360 L120,340 L160,540 L140,680 L-20,660 L-60,480 Z" fill="none" stroke="white" stroke-opacity="0.18" stroke-width="0.7"/>
    <path d="M-40,360 L120,340" stroke="white" stroke-opacity="0.35" stroke-width="1" filter="url(#crisp)"/>
    <path d="M0,400 L100,390 L130,520" fill="none" stroke="#5eead4" stroke-opacity="0.2" stroke-width="16" stroke-linecap="round" filter="url(#soft)"/>
  </g>
  <g transform="rotate(-12 180 500)">
    <path d="M140,440 L240,420 L260,530 L160,540 Z" fill="url(#g-violet)" filter="url(#crisp)"/>
    <path d="M140,440 L240,420" stroke="white" stroke-opacity="0.28" stroke-width="0.8" filter="url(#crisp)"/>
    <path d="M140,440 L240,420 L260,530 L160,540 Z" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="0.5"/>
  </g>

  <!-- ═══ Center: scattered small shards ═══ -->
  <g transform="rotate(-28 680 380)">
    <path d="M620,340 L760,310 L780,400 L700,430 Z" fill="url(#g-rose)" filter="url(#crisp)"/>
    <path d="M620,340 L760,310" stroke="white" stroke-opacity="0.32" stroke-width="0.9" filter="url(#crisp)"/>
    <path d="M620,340 L760,310 L780,400 L700,430 Z" fill="none" stroke="white" stroke-opacity="0.14" stroke-width="0.5"/>
  </g>
  <g transform="rotate(16 1000 340)">
    <path d="M940,280 L1060,260 L1080,380 L1020,420 L950,390 Z" fill="url(#g-blue)" filter="url(#crisp)"/>
    <path d="M940,280 L1060,260" stroke="white" stroke-opacity="0.3" stroke-width="0.8" filter="url(#crisp)"/>
    <path d="M940,280 L1060,260 L1080,380 L1020,420 L950,390 Z" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="0.5"/>
  </g>
  <!-- tiny chip -->
  <g transform="rotate(-10 850 460)">
    <path d="M810,440 L890,430 L900,480 Z" fill="url(#g-amber)" filter="url(#crisp)"/>
    <path d="M810,440 L890,430 L900,480 Z" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="0.4"/>
  </g>

  <!-- ═══ Mid-right: angular shard ═══ -->
  <g transform="rotate(-10 1640 460)">
    <path d="M1520,380 L1740,350 L1800,480 L1760,560 L1560,540 Z" fill="url(#g-cyan)" filter="url(#crisp)"/>
    <path d="M1520,380 L1740,350 L1800,480 L1760,560 L1560,540 Z" fill="none" stroke="white" stroke-opacity="0.18" stroke-width="0.7"/>
    <path d="M1520,380 L1740,350 L1800,480" stroke="white" stroke-opacity="0.34" stroke-width="1" filter="url(#crisp)"/>
    <path d="M1560,410 L1720,390 L1770,480" fill="none" stroke="#67e8f9" stroke-opacity="0.2" stroke-width="18" stroke-linecap="round" filter="url(#soft)"/>
  </g>

  <!-- ═══ Bottom-left: cluster ═══ -->
  <g transform="rotate(12 200 860)">
    <path d="M40,760 L280,730 L340,880 L300,960 L80,940 L20,840 Z" fill="url(#g-indigo)" filter="url(#crisp)"/>
    <path d="M40,760 L280,730 L340,880 L300,960 L80,940 L20,840 Z" fill="none" stroke="white" stroke-opacity="0.19" stroke-width="0.7"/>
    <path d="M40,760 L280,730 L340,880" stroke="white" stroke-opacity="0.36" stroke-width="1.1" filter="url(#crisp)"/>
    <path d="M80,790 L260,770 L310,870" fill="none" stroke="#a5b4fc" stroke-opacity="0.2" stroke-width="18" stroke-linecap="round" filter="url(#soft)"/>
  </g>
  <g transform="rotate(-8 120 980)">
    <path d="M-20,920 L140,900 L160,1020 L0,1040 Z" fill="url(#g-teal)" filter="url(#crisp)"/>
    <path d="M-20,920 L140,900" stroke="white" stroke-opacity="0.3" stroke-width="0.8" filter="url(#crisp)"/>
    <path d="M-20,920 L140,900 L160,1020 L0,1040 Z" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="0.5"/>
  </g>

  <!-- ═══ Bottom-center: shard + chip ═══ -->
  <g transform="rotate(-8 820 880)">
    <path d="M680,810 L900,780 L940,900 L880,960 L700,940 Z" fill="url(#g-violet)" filter="url(#crisp)"/>
    <path d="M680,810 L900,780 L940,900 L880,960 L700,940 Z" fill="none" stroke="white" stroke-opacity="0.17" stroke-width="0.7"/>
    <path d="M680,810 L900,780" stroke="white" stroke-opacity="0.34" stroke-width="1" filter="url(#crisp)"/>
    <path d="M720,840 L880,820 L920,890" fill="none" stroke="#c4b5fd" stroke-opacity="0.2" stroke-width="16" stroke-linecap="round" filter="url(#soft)"/>
  </g>
  <g transform="rotate(18 1060 920)">
    <path d="M1000,880 L1120,860 L1140,960 L1020,970 Z" fill="url(#g-rose)" filter="url(#crisp)"/>
    <path d="M1000,880 L1120,860" stroke="white" stroke-opacity="0.28" stroke-width="0.7" filter="url(#crisp)"/>
    <path d="M1000,880 L1120,860 L1140,960 L1020,970 Z" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="0.5"/>
  </g>

  <!-- ═══ Bottom-right: large shard ═══ -->
  <g transform="rotate(-6 1680 860)">
    <path d="M1500,760 L1760,730 L1840,860 L1800,980 L1560,960 L1480,850 Z" fill="url(#g-amber)" filter="url(#crisp)"/>
    <path d="M1500,760 L1760,730 L1840,860 L1800,980 L1560,960 L1480,850 Z" fill="none" stroke="white" stroke-opacity="0.18" stroke-width="0.7"/>
    <path d="M1500,760 L1760,730 L1840,860" stroke="white" stroke-opacity="0.35" stroke-width="1.1" filter="url(#crisp)"/>
    <path d="M1540,790 L1740,770 L1810,860" fill="none" stroke="#fde68a" stroke-opacity="0.2" stroke-width="20" stroke-linecap="round" filter="url(#soft)"/>
  </g>
  <g transform="rotate(14 1800 980)">
    <path d="M1740,940 L1880,920 L1920,1040 L1770,1050 Z" fill="url(#g-blue)" filter="url(#crisp)"/>
    <path d="M1740,940 L1880,920" stroke="white" stroke-opacity="0.3" stroke-width="0.8" filter="url(#crisp)"/>
    <path d="M1740,940 L1880,920 L1920,1040 L1770,1050 Z" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="0.5"/>
  </g>

  <!-- Floating tiny shards for depth -->
  <g transform="rotate(-35 420 200)">
    <path d="M380,170 L460,155 L470,210 Z" fill="url(#g-cyan)" filter="url(#crisp)"/>
    <path d="M380,170 L460,155 L470,210 Z" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="0.4"/>
  </g>
  <g transform="rotate(30 1260 220)">
    <path d="M1220,190 L1310,175 L1320,240 Z" fill="url(#g-teal)" filter="url(#crisp)"/>
    <path d="M1220,190 L1310,175 L1320,240 Z" fill="none" stroke="white" stroke-opacity="0.18" stroke-width="0.4"/>
  </g>
  <g transform="rotate(-18 500 640)">
    <path d="M460,610 L560,595 L570,660 L480,670 Z" fill="url(#g-indigo)" filter="url(#crisp)"/>
    <path d="M460,610 L560,595" stroke="white" stroke-opacity="0.25" stroke-width="0.6" filter="url(#crisp)"/>
    <path d="M460,610 L560,595 L570,660 L480,670 Z" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="0.4"/>
  </g>
  <g transform="rotate(24 1340 620)">
    <path d="M1300,590 L1390,575 L1400,650 L1320,660 Z" fill="url(#g-rose)" filter="url(#crisp)"/>
    <path d="M1300,590 L1390,575" stroke="white" stroke-opacity="0.24" stroke-width="0.6" filter="url(#crisp)"/>
    <path d="M1300,590 L1390,575 L1400,650 L1320,660 Z" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="0.4"/>
  </g>

  <!-- Specular highlight dots — light catching glass edges -->
  <circle cx="160" cy="60" r="2.5" fill="#e0d4ff" opacity="0.6"/>
  <circle cx="700" cy="-10" r="2.2" fill="#bae6fd" opacity="0.55"/>
  <circle cx="1620" cy="10" r="3" fill="#c7d2fe" opacity="0.58"/>
  <circle cx="80" cy="380" r="2" fill="#99f6e4" opacity="0.45"/>
  <circle cx="1680" cy="400" r="2.5" fill="#a5f3fc" opacity="0.5"/>
  <circle cx="200" cy="760" r="2.5" fill="#c7d2fe" opacity="0.55"/>
  <circle cx="760" cy="810" r="2.2" fill="#e0d4ff" opacity="0.45"/>
  <circle cx="1580" cy="760" r="2.8" fill="#fde68a" opacity="0.5"/>
  <circle cx="420" cy="170" r="1.6" fill="#a5f3fc" opacity="0.4"/>
  <circle cx="1260" cy="190" r="1.6" fill="#99f6e4" opacity="0.4"/>
</svg>
