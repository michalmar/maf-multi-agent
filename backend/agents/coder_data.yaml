# Coder specialist agent
# Delegates coding and code execution tasks to the Foundry Prompt Agent

name: coderdata_tool
display_name: Coder Data Agent
avatar: 💻
role: Software Engineer
model: gpt-5.2 (Foundry)

description: >
  Delegate data analysis, coding, or code execution tasks to the coder specialist agent.
  Performs higher-level data analysis (anomaly detection, complex trend correlation, etc.)
  and generates charts as inline images for the shared document.
  Use this tool when you need to write, review, debug, or execute code, generate scripts,
  create visualizations, or solve technical problems. The agent has access to all needed data.

task_description: >
  A detailed coding or data analysis request. Include the programming language,
  desired functionality, input/output expectations, and any constraints.
  IMPORTANT: When requesting charts or visualizations, specify that the agent must
  save them as PNG files and embed them inline using markdown image syntax
  (e.g., ![Chart](sandbox:/mnt/data/chart.png)). All charts must be rendered
  as actual images, never described in text only.

foundry_agent_name: CoderData
