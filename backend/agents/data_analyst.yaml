# Data Analyst specialist agent
# Calls the Fabric Data Agent MCP endpoint with DefaultAzureCredential
# (Azure CLI locally, Managed Identity in ACA)

name: data_analyst_tool
display_name: Data Analyst
avatar: 📊
role: Data Analyst
model: Fabric Data Agent (MCP)
type: mcp

description: >
  Delegate a data analysis task to the data analyst specialist agent.
  Use this tool when you need to query databases, analyze datasets, generate
  reports, create visualizations, or perform statistical analysis.

task_description: >
  A detailed data analysis request including the data source, specific
  questions to answer, metrics to compute, and desired output format.

mcp_url_env: FABRIC_DATA_AGENT_MCP_URL
mcp_tool_name: fabric-data-agent
mcp_auth:
  type: default_credential
  scope: https://api.fabric.microsoft.com/.default
