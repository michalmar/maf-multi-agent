[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:backend]
command=/app/.venv/bin/uvicorn src.api:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:frontend]
command=node /app/frontend-standalone/frontend/server.js
directory=/app
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
environment=PORT="3000",HOSTNAME="0.0.0.0",BACKEND_API_URL="http://127.0.0.1:8000",NODE_ENV="production"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
startretries=5
startsecs=3
