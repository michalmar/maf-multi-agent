# Deploy to Azure Container Apps
#
# Builds the Docker image in ACR (cloud build) and updates the Container App.
# Uses OIDC federated credentials — no stored secrets for Azure auth.
#
# Required GitHub configuration:
#   Secrets:  AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   Variables: ACR_NAME, APP_NAME, RESOURCE_GROUP

name: Deploy to ACA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override image tag (default: git SHA)"
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend deps
        run: cd backend && uv sync --frozen

      - name: Run backend tests
        run: cd backend && uv run python -m pytest tests/ -v

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

  build-and-deploy:
    name: Build & Deploy
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag || github.sha }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION=$(grep 'version' backend/pyproject.toml | head -1 | cut -d'"' -f2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build image in ACR
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.APP_NAME }}:${{ steps.tag.outputs.tag }} \
            --image ${{ vars.APP_NAME }}:latest \
            --build-arg APP_VERSION=${{ steps.tag.outputs.version }} \
            --build-arg GIT_SHA=${{ steps.tag.outputs.short_sha }} \
            --build-arg "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ vars.APP_NAME }}
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          imageToDeploy: ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.APP_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Health check
        run: |
          FQDN=$(az containerapp show \
            --name ${{ vars.APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "🌐 https://${FQDN}"
          echo ""

          # Wait for the latest revision to become running/ready.
          # The app is behind Entra ID Easy Auth so unauthenticated HTTP
          # requests return 302/401 — use the ACA revision status instead.
          for i in $(seq 1 18); do
            STATUS=$(az containerapp revision list \
              --name ${{ vars.APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --query "[0].properties.runningState" -o tsv 2>/dev/null || echo "unknown")
            case "$STATUS" in
              Running|RunningAtMaxScale)
                echo "✅ Revision is healthy (attempt $i, status: $STATUS)"
                HEALTHY=true
                break
                ;;
            esac
            echo "⏳ Waiting for revision... (attempt $i, status: $STATUS)"
            sleep 10
          done

          if [ "${HEALTHY:-}" != "true" ]; then
            echo "❌ Revision did not reach a healthy state within 180s (last: $STATUS)"
            exit 1
          fi

          # Verify the container is reachable (302/401 = app + Easy Auth OK)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}" || true)
          echo "🔒 HTTP response: $HTTP_CODE (302/401 expected — Entra ID auth is active)"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "❌ App is not reachable"
            exit 1
          fi
          echo "✅ Deploy verified"
